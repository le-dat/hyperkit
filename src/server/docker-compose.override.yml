# docker-compose.override.yml
services:
  postgres:
    ports:
      - "127.0.0.1:5433:5432"

  redis:
    ports:
      - "127.0.0.1:6379:6379"

  backend:
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - .:/app
    environment:
      - ENV=development
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker:
    volumes:
      - .:/app
    environment:
      - ENV=development
    command: ["python", "-m", "arq", "workers.WorkerSettings"]
