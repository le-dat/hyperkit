# docker-compose.override.yml
services:
  postgres:
    ports:
      - "127.0.0.1:5433:5432"

  redis:
    ports:
      - "127.0.0.1:6379:6379"

  backend:
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - .:/app
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  worker:
    volumes:
      - .:/app
    command: ["python", "-m", "arq", "workers.WorkerSettings"]
