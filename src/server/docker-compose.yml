# docker-compose.yml
services:
  postgres:
    image: postgres:16-alpine
    container_name: ai_chatbot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-chatbot}
      POSTGRES_HOST_AUTH_METHOD: md5
    command: >
      postgres
      -c shared_buffers=128MB
      -c max_connections=100
      -c work_mem=16MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - chatbot_net
      - npm_network

  redis:
    image: redis:7-alpine
    container_name: ai_chatbot_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - chatbot_net
      - npm_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/le-dat/hyperkit-backend:latest
    container_name: ai_chatbot_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - ENV=production
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/chat_db
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - chatbot_net
      - npm_network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/le-dat/hyperkit-backend:latest
    container_name: ai_chatbot_worker
    restart: unless-stopped
    env_file:
      - .env
    command: ["python", "-m", "arq", "workers.WorkerSettings"]
    environment:
      - ENV=production
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/chat_db
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chatbot_net
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

volumes:
  postgres_data:
  redis_data:

networks:
  chatbot_net:
    driver: bridge
  npm_network:
    driver: bridge